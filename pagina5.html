<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Misión: El Dilema de la IA</title>

    <!-- Mismas fuentes que la página principal -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- FontAwesome CDN (mismos iconos) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Hoja de estilos compartida del equipo -->
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/pagina5.css">
</head>
<body>
    <div class="container">

        <!-- =============== HEADER (igual al de index) =============== -->
        <header class="header">
            <div class="status-bar">
                <div class="time" id="clock"></div>
                <div class="status-icons">
                    <i class="fas fa-signal"></i>
                    <i class="fas fa-wifi"></i>
                    <i class="fas fa-battery-full"></i>
                </div>
            </div>
            <button class="hamburger-btn" id="hamburger-btn">
                <i class="fas fa-bars"></i>
            </button>
        </header>

        <!-- =============== MENÚ HAMBURGUESA (submenú deslizable) =============== -->
        <nav class="p5-nav-menu" id="p5NavMenu" aria-hidden="true">
            <button class="p5-nav-item" id="nav-inicio">
                <i class="fas fa-house"></i>
                <span>INICIO</span>
            </button>
            <button class="p5-nav-item" id="nav-reiniciar">
                <i class="fas fa-rotate-right"></i>
                <span>REINICIAR SIMULACIÓN</span>
            </button>
            <button class="p5-nav-item" id="nav-ayuda">
                <i class="fas fa-circle-question"></i>
                <span>AYUDA</span>
            </button>
        </nav>
        <!-- Fondo oscuro que cierra el menú al hacer clic fuera -->
        <div class="p5-nav-backdrop" id="p5NavBackdrop"></div>

        <!-- =============== MAIN CONTENT =============== -->
        <main class="main-content p5-main">

            <!-- Título de la misión -->
            <h1 class="mission-title">MISIÓN:<br>EL DILEMA DE LA IA</h1>

            <!-- Zona radial: círculos + iconos + avatar -->
            <div class="p5-radial-zone">
                
                <div class="p5-ring p5-ring--orbit"></div>

                <!-- Círculos de fondo -->
                <div class="p5-ring p5-ring--outer"></div>
                <div class="p5-ring p5-ring--inner"></div>

                <!-- Icono CANDADO — arriba -->
                <button class="p5-icon-btn p5-icon-btn--top" data-tip="candado" aria-label="Tip candado">
                    <i class="fas fa-lock"></i>
                </button>

                <!-- Icono OJO TACHADO — izquierda -->
                <button class="p5-icon-btn p5-icon-btn--left" data-tip="ojo" aria-label="Tip privacidad visual">
                    <i class="fas fa-eye-slash"></i>
                </button>

                <!-- Icono CHIP — derecha -->
                <button class="p5-icon-btn p5-icon-btn--right p5-icon-btn--chip" data-tip="chip" aria-label="Tip chip IA">
                    <i class="fas fa-microchip"></i>
                </button>

                <!-- Icono ESCUDO — abajo -->
                <button class="p5-icon-btn p5-icon-btn--bottom p5-icon-btn--shield" data-tip="escudo" aria-label="Tip escudo ético">
                    <i class="fas fa-shield-halved"></i>
                </button>

                <!-- Imagen del usuario en el centro -->
                <div class="p5-user-center">
                    <img src="src/img_p5/Usuario.png" alt="Usuario" class="p5-user-img">
                </div>
            </div>

        </main>

        <!-- =============== FOOTER (estilo compañero) =============== -->
        <footer class="footer p5-footer">
            <button class="footer-button" id="btn-anterior">
                <i class="fas fa-chevron-left"></i>
                <span>ANTERIOR</span>
            </button>
            <button class="footer-button p5-btn-finalizar" id="btn-finalizar">
                <span>FINALIZAR MISIÓN</span>
                <i class="fas fa-chevron-right"></i>
            </button>
        </footer>

    </div>

    <!-- =============== MODAL / POP-UP =============== -->
    <div class="p5-overlay" id="p5Overlay" role="dialog" aria-modal="true" aria-labelledby="p5PopupTitle">
        <div class="p5-popup">
            <!-- Header del popup -->
            <div class="p5-popup-header">
                <span class="p5-popup-icon" id="p5PopupIcon"></span>
                <h2 class="p5-popup-title" id="p5PopupTitle"></h2>
                <button class="p5-close-btn" id="p5CloseBtn" aria-label="Cerrar">
                    <i class="fas fa-times-circle"></i>
                </button>
            </div>

            <!-- Texto principal -->
            <div class="p5-popup-body">
                <ul class="p5-popup-list" id="p5PopupList"></ul>
            </div>

            <!-- Alerta -->
            <div class="p5-popup-alert" id="p5PopupAlert">
                <i class="fas fa-triangle-exclamation"></i>
                <span id="p5AlertText"></span>
            </div>
        </div>
    </div>

    <!-- JS específico de la página 5 -->
    <script src="js/pagina5.js"></script>
</body>
</html>
