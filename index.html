<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guardianes de la Identidad - Sistema de Ciberseguridad</title>
    
    <!-- Google Fonts: Orbitron (estilo glitch/técnico) y Montserrat (limpio) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <!-- FontAwesome CDN para iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Hoja de estilos externa -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- =============== HEADER =============== -->
        <header class="header">
            <button class="hamburger-btn" id="hamburger-btn">
                <i class="fas fa-bars"></i>
            </button>
        </header>

        <!-- =============== MAIN CONTENT =============== -->
        <main class="main-content">
            <!-- Título Principal -->
            <h1 class="main-title">
                GUARDIANES<br>DE LA IDENTIDAD
            </h1>

            <!-- Imagen Central -->
            <img src="pagina 1/PAG 1.png" alt="Escudo IA" class="central-image">

            <!-- Subtítulo -->
            <p class="subtitle">
                Protege tus datos en la era de la Inteligencia Artificial
            </p>

            <!-- Botón Principal -->
            <button class="primary-button" id="login-btn">
                <span class="button-text">INICIA SESIÓN SEGURA</span>
                <span class="button-icon"><i class="fas fa-chevron-right"></i></span>
            </button>
        </main>

        <!-- =============== FOOTER =============== -->
        <footer class="footer">
            <!-- Botón SECURE -->
            <button class="footer-button" id="secure-btn">
                <img src="pagina 1/CANDADO.png" alt="Seguro" class="footer-button-icon">
                <span>SECURE</span>
            </button>

            <!-- Botón IA INTEL -->
            <button class="footer-button" id="ia-btn">
                <img src="pagina 1/IA ICONO.png" alt="IA" class="footer-button-icon">
                <span>IA INTEL</span>
            </button>

            <!-- Botón AYUDA -->
            <button class="footer-button" id="help-btn">
                <img src="pagina 1/AYUDA.png" alt="Ayuda" class="footer-button-icon">
                <span>AYUDA</span>
            </button>
        </footer>
    </div>

    <!-- =============== JAVASCRIPT =============== -->
    <script src="script.js"></script>
</body>
</html>
